<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizan | AI Solutions Architect & Full-Stack Dev</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── PREMIUM LUXURY DESIGN TOKENS ─────────────────────────────────────────────
        const T = {
          bg: "#030303",          // Ultra Deep Onyx
          surface: "#09090b",     // Obsidian Surface
          glass: "rgba(9,9,11,0.6)", 
          border: "rgba(255,255,255,0.04)",
          borderHover: "rgba(0,255,135,0.25)",
          emerald: "#00ff87",     // Neon Emerald Hyper Glow
          silver: "#f4f4f5",      // Crisp Platinum
          muted: "#71717a",       // Muted Steel Grey
          text: "#e4e4e7",        // Clean Slate Text
        };

        // ─── GLOBAL STYLES (LUXURY REDESIGN) ──────────────────────────────────────────
        const GlobalStyles = () => (
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Cabinet+Grotesk:wght@700;800;900&family=JetBrains+Mono:wght@300;400&display=swap');

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            html { scroll-behavior: smooth; background: \${T.bg}; }
            body {
              background: \${T.bg};
              color: \${T.text};
              font-family: 'Plus Jakarta Sans', sans-serif;
              overflow-x: hidden;
              letter-spacing: -0.01em;
            }

            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-track { background: \${T.bg}; }
            ::-webkit-scrollbar-thumb { background: #18181b; border-radius: 3px; }

            .cabinet { font-family: 'Cabinet Grotesk', sans-serif; }
            .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.05em; }

            .glass-panel {
              background: \${T.glass};
              backdrop-filter: blur(20px);
              -webkit-backdrop-filter: blur(20px);
              border: 1px solid \${T.border};
              box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            }

            @keyframes subtle-float {
              0%, 100% { transform: translateY(0px); }
              50% { transform: translateY(-6px); }
            }
            .animate-float { animation: subtle-float 8s ease-in-out infinite; }

            .text-luxury-gradient {
              background: linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              background-clip: text;
            }

            .text-emerald-glow {
              color: \${T.emerald};
              text-shadow: 0 0 20px rgba(0, 255, 135, 0.4);
            }

            .card-premium {
              transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            }
            .card-premium:hover {
              transform: translateY(-4px) scale(1.01);
              border-color: \${T.borderHover} !important;
              box-shadow: 0 12px 40px rgba(0, 255, 135, 0.03);
            }

            .btn-premium {
              position: relative;
              transition: all 0.3s ease;
              cursor: pointer;
              background: #fff;
              color: #000;
              border: none;
              font-weight: 600;
            }
            .btn-premium:hover {
              background: \${T.emerald};
              box-shadow: 0 0 30px rgba(0, 255, 135, 0.3);
              transform: translateY(-2px);
            }

            .nav-link-premium {
              position: relative;
              transition: color 0.3s ease;
              background: none;
              border: none;
              cursor: pointer;
              font-weight: 500;
            }
            .nav-link-premium::after {
              content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: \${T.emerald}; transition: width 0.3s ease;
            }
            .nav-link-premium:hover::after { width: 100%; }
            .nav-link-premium:hover { color: #fff; }

            .ambient-glow {
              position: fixed; width: 600px; height: 600px;
              background: radial-gradient(circle, rgba(0,255,135,0.015) 0%, transparent 70%);
              top: -200px; left: -200px; pointer-events: none; z-index: 0;
            }
            .ambient-glow-2 {
              position: fixed; width: 500px; height: 500px;
              background: radial-gradient(circle, rgba(0,165,233,0.01) 0%, transparent 70%);
              bottom: -100px; right: -100px; pointer-events: none; z-index: 0;
            }
          `}</style>
        );

        // ─── HIGH PERFORMANCE CANVAS ─────────────────────────────────────────────────
        const ParticleCanvas = () => {
          const canvasRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext("2d");
            let W = canvas.width = window.innerWidth;
            let H = canvas.height = window.innerHeight;

            const isMobile = W < 768;
            const PARTICLE_COUNT = isMobile ? 15 : 35; 

            const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
              x: Math.random() * W,
              y: Math.random() * H,
              vx: (Math.random() - 0.5) * 0.15,
              vy: (Math.random() - 0.5) * 0.15,
              r: Math.random() * 1.0 + 0.5,
              color: Math.random() > 0.85 ? T.emerald : "rgba(113,113,122,0.15)",
            }));

            let id;
            const draw = () => {
              ctx.clearRect(0, 0, W, H);
              particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > W) p.vx *= -1;
                if (p.y < 0 || p.y > H) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
              });
              id = requestAnimationFrame(draw);
            };

            draw();
            const resize = () => { if(canvas) { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; } };
            window.addEventListener("resize", resize);
            return () => { cancelAnimationFrame(id); window.removeEventListener("resize", resize); };
          }, []);

          return <canvas ref={canvasRef} style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 0 }} />;
        };

        // ─── NAVIGATION ───────────────────────────────────────────────────────────────
        const Nav = () => {
          const [menuOpen, setMenuOpen] = useState(false);
          const scrollTo = (id) => {
            document.getElementById(id.toLowerCase())?.scrollIntoView({ behavior: "smooth" });
            setMenuOpen(false);
          };

          return (
            <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 1000, padding: "0 6%", background: "rgba(3,3,3,0.75)", borderBottom: `1px solid \${T.border}`, backdropFilter: "blur(20px)", webkitBackdropFilter: "blur(20px)" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", height: 72, maxWidth: 1300, margin: "0 auto" }}>
                <div className="cabinet" style={{ fontSize: 16, fontWeight: 800, letterSpacing: "0.05em", cursor: "pointer" }} onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}>
                  FAIZAN <span className="mono" style={{ color: T.emerald, marginLeft: 6 }}>SYSTEMS v4</span>
                </div>

                <div style={{ display: "flex", gap: 32, alignItems: "center" }} className="desktop-nav">
                  {["About", "Expertise", "Experience", "Work", "Contact"].map(l => (
                    <button key={l} className="nav-link-premium mono" onClick={() => scrollTo(l)} style={{ color: T.muted, fontSize: 11 }}>
                      {l.toUpperCase()}
                    </button>
                  ))}
                </div>

                <button onClick={() => setMenuOpen(!menuOpen)} style={{ background: "none", border: "none", flexDirection: "column", gap: 6, display: "none" }} className="hamburger">
                  <span style={{ display: "block", width: 22, height: 1, background: "#fff" }} />
                  <span style={{ display: "block", width: 22, height: 1, background: "#fff" }} />
                </button>
              </div>

              {menuOpen && (
                <div style={{ background: T.surface, padding: "24px 6%", display: "flex", flexDirection: "column", gap: 20, borderBottom: `1px solid \${T.border}` }}>
                  {["About", "Expertise", "Experience", "Work", "Contact"].map(l => (
                    <button key={l} onClick={() => scrollTo(l)} className="mono" style={{ background: "none", border: "none", color: T.text, textAlign: "left", fontSize: 13 }}>{l.toUpperCase()}</button>
                  ))}
                </div>
              )}

              <style>{`
                @media (max-width: 768px) { .desktop-nav { display: none !important; } .hamburger { display: flex !important; } }
              `}</style>
            </nav>
          );
        };

        // ─── HERO ─────────────────────────────────────────────────────────────────────
        const Hero = () => (
          <section id="about" style={{ minHeight: "95vh", display: "flex", alignItems: "center", padding: "120px 6% 80px", position: "relative", zIndex: 1 }}>
            <div style={{ maxWidth: 1200, width: "100%", margin: "0 auto" }}>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 10, marginBottom: 28, background: "rgba(255,255,255,0.02)", border: `1px solid \${T.border}`, padding: "6px 14px", borderRadius: 100 }}>
                <span style={{ width: 6, height: 6, borderRadius: "50%", background: T.emerald, boxShadow: `0 0 10px \${T.emerald}` }} />
                <span className="mono" style={{ fontSize: 10, color: "#fff", letterSpacing: "0.08em" }}>AVAILABLE FOR ELITE CONTRACTS</span>
              </div>

              <h1 className="cabinet" style={{ fontSize: "clamp(46px, 7.5vw, 96px)", fontWeight: 900, lineHeight: 0.9, marginBottom: 28, letterSpacing: "-0.04em" }}>
                <span className="text-luxury-gradient">AUTONOMOUS</span><br />
                <span className="text-emerald-glow">AI ARCHITECTURE</span>
              </h1>

              <p style={{ fontSize: "clamp(16px, 1.6vw, 19px)", color: T.text, maxWidth: 640, lineHeight: 1.7, marginBottom: 44, fontWeight: 300 }}>
                Engineering uncompromised digital infrastructure. I architect high-performance full-stack web products, robust SEO engines, and bespoke AI automated workflows designed for maximum scalability.
              </p>

              <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
                <button className="btn-premium cabinet" onClick={() => document.getElementById("contact")?.scrollIntoView({ behavior: "smooth" })}
                  style={{ padding: "16px 36px", borderRadius: 0, fontSize: 12, letterSpacing: "0.05em" }}>
                  INITIATE BRIEF
                </button>
              </div>

              <div style={{ display: "flex", gap: 56, marginTop: 80, paddingTop: 40, borderTop: `1px solid \${T.border}`, flexWrap: "wrap" }}>
                {[["04+", "YEARS ACTIVE"], ["50+", "DEPLOYED SYSTEMS"], ["100%", "RETENTION RATE"]].map(([num, label]) => (
                  <div key={label}>
                    <div className="cabinet" style={{ fontSize: 28, fontWeight: 800, color: "#fff" }}>{num}</div>
                    <div className="mono" style={{ color: T.muted, marginTop: 6, fontSize: 9 }}>{label}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );

        // ─── EXPERTISE ────────────────────────────────────────────────────────────────
        const Expertise = () => {
          const pillars = [
            { icon: "⚡", label: "AI SYSTEMS ENGINEERING", desc: "Autonomous data pipelines, advanced LLM prompt alignment, and enterprise automation infrastructure.", skills: ["Agents", "Prompt Tuning", "RAG Map", "Vector DB"] },
            { icon: "⚲", label: "ADVANCED ARCHITECTURES", desc: "Blazing fast headless applications, robust full-stack engines, and optimized high-end Shopify solutions.", skills: ["React Enterprise", "NextJS", "API Mesh", "Node Engine"] },
            { icon: "📈", label: "ALGORITHMIC GROWTH", desc: "Deep technical infrastructure visibility engineering, complex rich schema structure, and programmatic visibility maps.", skills: ["Technical SEO", "Semantic Web", "Vitals Opt", "Analytics"] },
            { icon: "◈", label: "HIGH-END REFINEMENT", desc: "Premium interface dynamics, cinematic interaction models, and ultra-fluid custom product layout designs.", skills: ["UI Motion", "Figma Elite", "After Effects", "Blender Framework"] }
          ];

          return (
            <section id="expertise" style={{ padding: "100px 6%", position: "relative", zIndex: 1 }}>
              <div style={{ maxWidth: 1300, margin: "0 auto" }}>
                <div style={{ marginBottom: 64 }}>
                  <div className="mono" style={{ color: T.emerald, marginBottom: 12 }}>01 / SYSTEM CAPABILITIES</div>
                  <h2 className="cabinet" style={{ fontSize: "clamp(36px, 5vw, 60px)", fontWeight: 900, letterSpacing: "-0.03em" }}>CORE SPECIALIZATIONS</h2>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 20 }}>
                  {pillars.map(p => (
                    <div key={p.label} className="glass-panel card-premium" style={{ padding: 36, borderRadius: 0 }}>
                      <div style={{ fontSize: 24, color: T.emerald, marginBottom: 20 }}>{p.icon}</div>
                      <div className="cabinet" style={{ fontSize: 15, fontWeight: 800, color: "#fff", marginBottom: 12, letterSpacing: "0.02em" }}>{p.label}</div>
                      <p style={{ fontSize: 13, color: T.text, lineHeight: 1.6, marginBottom: 28, fontWeight: 300 }}>{p.desc}</p>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                        {p.skills.map(s => <span key={s} className="mono" style={{ fontSize: 9, border: `1px solid \${T.border}`, padding: "4px 10px", color: T.muted, background: "rgba(255,255,255,0.01)" }}>{s}</span>)}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        // ─── EXPERIENCE ───────────────────────────────────────────────────────────────
        const Experience = () => {
          const timeline = [
            { role: "Senior Freelance Digital Consultant", company: "Global Operations (Upwork / Fiverr)", period: "2023 - PRESENT", detail: "Developing high-tier full-stack structures, deploying customized business intelligence layouts, custom automated pipelines, and managing advanced luxury enterprise infrastructure implementations." },
            { role: "Full-Stack & Visibility Engineer", company: "Premium Digital Agency", period: "2022 - 2023", detail: "Engineered responsive scalable client portals. Managed rich deep programmatic schema integration layouts, elevating global organic reach vectors by up to 60%." }
          ];

          return (
            <section id="experience" style={{ padding: "100px 6%", position: "relative", zIndex: 1 }}>
              <div style={{ maxWidth: 1000, margin: "0 auto" }}>
                <div style={{ marginBottom: 64 }}>
                  <div className="mono" style={{ color: T.emerald, marginBottom: 12 }}>02 / PROVEN TRACK RECORD</div>
                  <h2 className="cabinet" style={{ fontSize: "clamp(36px, 5vw, 60px)", fontWeight: 900, letterSpacing: "-0.03em" }}>OPERATIONAL TIMELINE</h2>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                  {timeline.map((t, idx) => (
                    <div key={idx} className="glass-panel card-premium" style={{ padding: 40, borderRadius: 0, display: "flex", gap: 32, flexWrap: "wrap" }}>
                      <div className="mono" style={{ color: T.emerald, minWidth: 120 }}>{t.period}</div>
                      <div style={{ flex: 1 }}>
                        <h3 className="cabinet" style={{ fontSize: 20, fontWeight: 800, color: "#fff", marginBottom: 6 }}>{t.role}</h3>
                        <div className="mono" style={{ color: T.muted, marginBottom: 16 }}>{t.company}</div>
                        <p style={{ fontSize: 14, color: T.text, lineHeight: 1.6, fontWeight: 300 }}>{t.detail}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        // ─── WORK / CASE STUDIES ──────────────────────────────────────────────────────
        const Work = () => {
          const projects = [
            { title: "Autonomous Intelligence Unit", category: "AI FRAMEWORKS", desc: "Orchestrated multi-threaded LLM configurations performing real-time structural asset vectorization and matrix mapping.", tech: ["LangChain", "GPT-4 Engine", "Node.js"] },
            { title: "Decoupled Luxury E-Commerce", category: "FULL-STACK OPERATIONS", desc: "Designed architectural blueprint map for modular headless commerce pipelines with isolated lightning fast inventory matrices.", tech: ["Shopify Core API", "React.JS", "Tailwind Spec"] },
            { title: "Programmatic Indexing Engine", category: "ALGORITHMIC AUDITING", desc: "Automated macro structural layout deployment mechanics engineered for absolute real-time metadata validation indexing.", tech: ["Python Systems", "Automation Maps", "API Mesh"] }
          ];

          return (
            <section id="work" style={{ padding: "100px 6%", position: "relative", zIndex: 1 }}>
              <div style={{ maxWidth: 1300, margin: "0 auto" }}>
                <div style={{ marginBottom: 64 }}>
                  <div className="mono" style={{ color: T.emerald, marginBottom: 12 }}>03 / ARCHITECTURAL ARTIFACTS</div>
                  <h2 className="cabinet" style={{ fontSize: "clamp(36px, 5vw, 60px)", fontWeight: 900, letterSpacing: "-0.03em" }}>CASE ANALYSIS</h2>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: 24 }}>
                  {projects.map((p, i) => (
                    <div key={i} className="glass-panel card-premium" style={{ padding: 40, borderRadius: 0, display: "flex", flexDirection: "column", justifyContent: "space-between", minHeight: 260 }}>
                      <div>
                        <div className="mono" style={{ color: T.emerald, marginBottom: 16 }}>{p.category}</div>
                        <h3 className="cabinet" style={{ fontSize: 22, fontWeight: 800, color: "#fff", marginBottom: 14 }}>{p.title}</h3>
                        <p style={{ fontSize: 13, color: T.text, lineHeight: 1.6, fontWeight: 300 }}>{p.desc}</p>
                      </div>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 32 }}>
                        {p.tech.map(t => <span key={t} className="mono" style={{ fontSize: 9, background: "rgba(255,255,255,0.02)", padding: "4px 10px", color: T.muted, border: `1px solid \${T.border}` }}>{t}</span>)}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        // ─── NATIVE BANNER INJECTOR (ZONE: 2942392) ───────────────────────────────────
        const NativeAdSlot = () => {
          const containerRef = useRef(null);

          useEffect(() => {
            if (containerRef.current) {
              const scriptConfig = document.createElement("script");
              scriptConfig.type = "text/javascript";
              scriptConfig.text = `
                atOptions = {
                  'key' : '2942392',
                  'format' : 'iframe',
                  'height' : 90,
                  'width' : 728,
                  'params' : {}
                };
              `;

              const scriptInvoke = document.createElement("script");
              scriptInvoke.type = "text/javascript";
              scriptInvoke.src = "//www.highperformanceformat.com/2942392/invoke.js";

              containerRef.current.appendChild(scriptConfig);
              containerRef.current.appendChild(scriptInvoke);
            }
          }, []);

          return (
            <div style={{ width: "100%", display: "flex", justifyContent: "center", padding: "40px 6%", background: "transparent", position: "relative", zIndex: 1 }}>
              <div ref={containerRef} style={{ maxWidth: "100%", overflow: "hidden", border: `1px solid \${T.border}`, background: T.surface, boxShadow: "0 4px 30px rgba(0,0,0,0.5)" }} />
            </div>
          );
        };

        // ─── BACKGROUND AD INJECTORS (SOCIAL, POPUNDER, VIGNETTE) ─────────────────────
        const BackgroundAds = () => {
          useEffect(() => {
            // 1. Social Bar Code (Zone: 2942394)
            const scriptSocial = document.createElement("script");
            scriptSocial.type = "text/javascript";
            scriptSocial.src = "//www.highperformanceformat.com/2942394/invoke.js";
            document.body.appendChild(scriptSocial);

            // 2. Popunder Code (Zone: 2942390)
            const scriptPop = document.createElement("script");
            scriptPop.type = "text/javascript";
            scriptPop.src = "//www.highperformanceformat.com/2942390/invoke.js";
            document.body.appendChild(scriptPop);

            // 3. Vignette Ad Code (Zone: 2942393)
            const scriptVignette = document.createElement("script");
            scriptVignette.type = "text/javascript";
            scriptVignette.src = "//www.highperformanceformat.com/2942393/invoke.js";
            document.body.appendChild(scriptVignette);
          }, []);
          return null;
        };

        // ─── CONTACT ──────────────────────────────────────────────────────────────────
        const Contact = () => {
          const [sent, setSent] = useState(false);
          return (
            <section id="contact" style={{ padding: "100px 6% 140px", position: "relative", zIndex: 1 }}>
              <div style={{ maxWidth: 640, margin: "0 auto", textAlign: "center" }}>
                <div className="mono" style={{ color: T.emerald, marginBottom: 12 }}>04 / INQUIRY INTENTION</div>
                <h2 className="cabinet" style={{ fontSize: "clamp(36px, 5vw, 60px)", fontWeight: 900, marginBottom: 32, letterSpacing: "-0.03em" }}>ENGAGE FRAMEWORK</h2>
                
                <div className="glass-panel" style={{ padding: 48, borderRadius: 0, textAlign: "left" }}>
                  {sent ? (
                    <div style={{ textAlign: "center", padding: "30px 0" }}>
                      <div className="cabinet" style={{ color: T.emerald, fontSize: 20, fontWeight: 800, marginBottom: 12 }}>TRANSMISSION SECURED</div>
                      <p style={{ color: T.text, fontSize: 14, fontWeight: 300 }}>Response protocols mapped within 24 operational hours.</p>
                    </div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
                      <input placeholder="Client Identification (Name)" style={{ width: "100%", background: "rgba(255,255,255,0.01)", border: `1px solid \${T.border}`, padding: 16, color: "#fff", fontFamily: "inherit" }} />
                      <input placeholder="Secure Return Vector (Email)" style={{ width: "100%", background: "rgba(255,255,255,0.01)", border: `1px solid \${T.border}`, padding: 16, color: "#fff", fontFamily: "inherit" }} />
                      <textarea placeholder="Outline tactical scope or technical architectural prerequisites..." style={{ width: "100%", background: "rgba(255,255,255,0.01)", border: `1px solid \${T.border}`, padding: 16, color: "#fff", minHeight: 120, fontFamily: "inherit", resize: "none" }} />
                      <button onClick={() => setSent(true)} className="btn-premium cabinet" style={{ padding: 18, fontSize: 11, letterSpacing: "0.1em" }}>
                        DISPATCH SECURE TELEMETRY →
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </section>
          );
        };

        // ─── MAIN APP ──────────────────────────────────────────────────────────────────
        function App() {
          return (
            <>
              <GlobalStyles />
              <div className="ambient-glow" />
              <div className="ambient-glow-2" />
              <ParticleCanvas />
              <Nav />
              <main style={{ maxWidth: 1400, margin: "0 auto", position: "relative" }}>
                <Hero />
                <Expertise />
                <Experience />
                <Work />
                <NativeAdSlot />
                <Contact />
              </main>
              <BackgroundAds />
              <footer style={{ padding: "40px 6%", borderTop: `1px solid \${T.border}`, textAlign: "center", color: T.muted }} className="mono">
                © 2026 FAIZAN · METRIC VECTOR PROTOCOLS OPERATIONAL
              </footer>
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

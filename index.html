<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizan | AI Solutions Architect & Full-Stack Dev</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/javascript" src="//www.highperformanceformat.com/2942394/invoke.js" async></script>
    <script type="text/javascript" src="//www.highperformanceformat.com/2942390/invoke.js" async></script>
    <script type="text/javascript" src="//www.highperformanceformat.com/2942393/invoke.js" async></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ─── PREMIUM MIX-GRADIENT DESIGN TOKENS (ZERO WHITE) ─────────────────────────
        const T = {
          bg: "#020205",          
          surface: "#05050e",     
          glass: "rgba(5,5,14,0.7)", 
          border: "rgba(0,255,135,0.08)",
          borderHover: "rgba(0,195,255,0.4)",
          emerald: "#00ff87",     
          cyan: "#00f0ff",        
          purple: "#bd00ff",      
          text: "#8fa0c0",        
          muted: "#47526e",       
        };

        const GlobalStyles = () => (
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Syne:wght=700;800&family=Space+Grotesk:wght=400;500;600&family=JetBrains+Mono:wght=400;700&display=swap');

            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            html { scroll-behavior: smooth; background: \${T.bg}; }
            body {
              background: \${T.bg};
              color: \${T.text};
              font-family: 'Space Grotesk', sans-serif;
              overflow-x: hidden;
            }

            ::-webkit-scrollbar { width: 5px; }
            ::-webkit-scrollbar-track { background: \${T.bg}; }
            ::-webkit-scrollbar-thumb { background: #0b0b1e; border-radius: 3px; border: 1px solid \${T.cyan}; }

            .syne { font-family: 'Syne', sans-serif; }
            .mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.08em; }

            .glass-panel {
              background: \${T.glass};
              backdrop-filter: blur(24px);
              -webkit-backdrop-filter: blur(24px);
              border: 1px solid \${T.border};
              box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.9), inset 0 1px 1px rgba(255,255,255,0.02);
            }

            .text-gradient-cyan-emerald {
              background: linear-gradient(135deg, \${T.cyan} 0%, \${T.emerald} 100%);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              background-clip: text;
            }

            .text-gradient-purple-cyan {
              background: linear-gradient(135deg, \${T.purple} 0%, \${T.cyan} 100%);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              background-clip: text;
            }

            .text-gradient-muted-steel {
              background: linear-gradient(180deg, #a4b3cf 0%, #5d6b88 100%);
              -webkit-background-clip: text;
              -webkit-text-fill-color: transparent;
              background-clip: text;
            }

            .card-premium { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
            .card-premium:hover {
              transform: translateY(-6px);
              border-color: \${T.borderHover} !important;
              box-shadow: 0 15px 45px rgba(0, 240, 255, 0.06);
            }

            .btn-premium {
              position: relative; transition: all 0.4s ease; cursor: pointer;
              background: linear-gradient(135deg, \${T.cyan} 0%, \${T.emerald} 100%);
              color: #020205; border: none; font-weight: 700;
              box-shadow: 0 0 20px rgba(0, 255, 135, 0.2);
            }
            .btn-premium:hover {
              background: linear-gradient(135deg, \${T.purple} 0%, \${T.cyan} 100%);
              box-shadow: 0 0 35px rgba(189, 0, 255, 0.4);
              transform: translateY(-3px); color: #fff;
            }

            .nav-link-premium { position: relative; transition: all 0.3s ease; background: none; border: none; cursor: pointer; font-weight: 500; color: \address{T.text}; }
            .nav-link-premium::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 1px; background: \${T.cyan}; transition: width 0.3s ease; }
            .nav-link-premium:hover::after { width: 100%; }
            .nav-link-premium:hover { color: \${T.cyan}; text-shadow: 0 0 10px rgba(0,240,255,0.5); }

            .ambient-glow-1 { position: fixed; width: 700px; height: 700px; background: radial-gradient(circle, rgba(0,240,255,0.02) 0%, transparent 70%); top: -300px; left: -200px; pointer-events: none; z-index: 0; }
            .ambient-glow-2 { position: fixed; width: 600px; height: 600px; background: radial-gradient(circle, rgba(189,0,255,0.015) 0%, transparent 70%); bottom: -200px; right: -100px; pointer-events: none; z-index: 0; }
          `}</style>
        );

        const ParticleCanvas = () => {
          const canvasRef = useRef(null);
          useEffect(() => {
            const canvas = canvasRef.current; const ctx = canvas.getContext("2d");
            let W = canvas.width = window.innerWidth; let H = canvas.height = window.innerHeight;
            const isMobile = W < 768; const PARTICLE_COUNT = isMobile ? 20 : 45; 
            const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
              x: Math.random() * W, y: Math.random() * H,
              vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2,
              r: Math.random() * 1.5 + 0.5, color: Math.random() > 0.5 ? T.cyan : T.purple,
            }));
            let id;
            const draw = () => {
              ctx.clearRect(0, 0, W, H);
              particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > W) p.vx *= -1; if (p.y < 0 || p.y > H) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.shadowBlur = 8; ctx.shadowColor = p.color; ctx.fill(); ctx.shadowBlur = 0; 
              });
              id = requestAnimationFrame(draw);
            };
            draw();
            const resize = () => { if(canvas) { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; } };
            window.addEventListener("resize", resize);
            return () => { cancelAnimationFrame(id); window.removeEventListener("resize", resize); };
          }, []);
          return <canvas ref={canvasRef} style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 0, opacity: 0.6 }} />;
        };

        const Nav = () => {
          const [menuOpen, setMenuOpen] = useState(false);
          return (
            <nav style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 1000, padding: "0 6%", background: "rgba(2,2,5,0.85)", borderBottom: `1px solid \${T.border}`, backdropFilter: "blur(20px)", webkitBackdropFilter: "blur(20px)" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", height: 76, maxWidth: 1300, margin: "0 auto" }}>
                <div className="syne" style={{ fontSize: 18, fontWeight: 800, cursor: "pointer" }} onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}>
                  <span className="text-gradient-cyan-emerald">FAIZAN</span>
                  <span className="mono" style={{ color: T.purple, marginLeft: 8, fontSize: 10 }}>[CORE_MESH]</span>
                </div>
                <div style={{ display: "flex", gap: 36, alignItems: "center" }} className="desktop-nav">
                  {["About", "Expertise", "Experience", "Work", "Contact"].map(l => (
                    <button key={l} className="nav-link-premium mono" onClick={() => document.getElementById(l.toLowerCase())?.scrollIntoView({ behavior: "smooth" })}>{l.toUpperCase()}</button>
                  ))}
                </div>
              </div>
            </nav>
          );
        };

        const Hero = () => (
          <section id="about" style={{ minHeight: "95vh", display: "flex", alignItems: "center", padding: "130px 6% 80px", position: "relative", zIndex: 1 }}>
            <div style={{ maxWidth: 1200, width: "100%", margin: "0 auto" }}>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 10, marginBottom: 28, background: "rgba(0,240,255,0.03)", border: `1px solid \${T.cyan}`, padding: "6px 16px", borderRadius: 4 }}>
                <span style={{ width: 6, height: 6, borderRadius: "50%", background: T.cyan, boxShadow: `0 0 12px \${T.cyan}` }} />
                <span className="mono" style={{ fontSize: 10, color: T.cyan }}>NEURAL LINK CONFIGURATION SECURED</span>
              </div>
              <h1 className="syne" style={{ fontSize: "clamp(44px, 7.5vw, 92px)", fontWeight: 800, lineHeight: 0.95, marginBottom: 32, letterSpacing: "-0.03em" }}>
                <span className="text-gradient-muted-steel">AUTOMATED</span><br />
                <span className="text-gradient-cyan-emerald">AI INFRASTRUCTURE</span>
              </h1>
              <p style={{ fontSize: "clamp(16px, 1.5vw, 19px)", color: T.text, maxWidth: 660, lineHeight: 1.7, marginBottom: 48 }}>
                Deploying tactical full-stack web applications, sophisticated programmatic growth matrices, and custom multi-agent machine automation. Zero legacy styling. Pure core digital transformation.
              </p>
              <div style={{ display: "flex", gap: 64, marginTop: 90, paddingTop: 44, borderTop: `1px solid \${T.border}`, flexWrap: "wrap" }}>
                {[["04+", "YEARS SECURED", T.cyan], ["50+", "ENGINES DEPLOYED", T.emerald], ["100%", "RETENTION VECTOR", T.purple]].map(([num, label, color]) => (
                  <div key={label}>
                    <div className="syne" style={{ fontSize: 32, fontWeight: 800, color: color }}>{num}</div>
                    <div className="mono" style={{ color: T.muted, marginTop: 6, fontSize: 9 }}>{label}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );

        const Expertise = () => (
          <section id="expertise" style={{ padding: "110px 6%", position: "relative", zIndex: 1 }}>
            <div style={{ maxWidth: 1300, margin: "0 auto" }}>
              <div style={{ marginBottom: 68 }}>
                <div className="mono" style={{ color: T.purple, marginBottom: 12 }}>// MODULAR MATRIX PILLARS</div>
                <h2 className="syne" style={{ fontSize: "clamp(34px, 5vw, 56px)", fontWeight: 800 }}><span className="text-gradient-cyan-emerald">SYSTEM VECTOR EXPERTISE</span></h2>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 24 }}>
                {[
                  { icon: "⚡", label: "AUTONOMOUS MACHINE ENGINE", desc: "Complex LLM system pipelines, custom structural alignment mechanics, and production-level system automation mappings.", skills: ["Core Agents", "Prompt Alignment", "Vector Mesh"] },
                  { icon: "⚲", label: "DECOUPLED APPLICATION ARCHITECTURE", desc: "Bespoke high-speed enterprise full-stack layers, microservices frameworks, and performance-tuned Shopify setups.", skills: ["React Engine", "NextJS System", "API Injections"] }
                ].map(p => (
                  <div key={p.label} className="glass-panel card-premium" style={{ padding: 36 }}>
                    <div style={{ fontSize: 24, marginBottom: 20, color: T.cyan }}>{p.icon}</div>
                    <div className="syne" style={{ fontSize: 15, fontWeight: 800, color: T.cyan, marginBottom: 14 }}>{p.label}</div>
                    <p style={{ fontSize: 13, color: T.text, lineHeight: 1.6, marginBottom: 28 }}>{p.desc}</p>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                      {p.skills.map(s => <span key={s} className="mono" style={{ fontSize: 9, border: `1px solid \${T.border}`, padding: "4px 10px", color: T.purple }}>{s}</span>)}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );

        // ─── DOM INJECTION AD ZONE FOR ADSTERRA BANNER ───────────────────────────────
        const NativeAdSlot = () => {
          useEffect(() => {
            const container = document.getElementById("adsterra-native-slot");
            if (container && !container.innerHTML) {
              const conf = document.createElement("script");
              conf.type = "text/javascript";
              conf.text = "atOptions = { 'key' : '2942392', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };";
              const inv = document.createElement("script");
              inv.type = "text/javascript";
              inv.src = "//www.highperformanceformat.com/2942392/invoke.js";
              container.appendChild(conf);
              container.appendChild(inv);
            }
          }, []);

          return (
            <div style={{ width: "100%", display: "flex", justifyContent: "center", padding: "60px 6%", position: "relative", zIndex: 5 }}>
              <div id="adsterra-native-slot" style={{ maxWidth: "100%", minHeight: "90px", minWidth: "320px", background: T.surface, border: `1px solid \${T.borderHover}`, boxShadow: "0 0 30px rgba(0,240,255,0.1)" }} />
            </div>
          );
        };

        function App() {
          return (
            <>
              <GlobalStyles />
              <div className="ambient-glow-1" />
              <div className="ambient-glow-2" />
              <ParticleCanvas />
              <Nav />
              <main style={{ maxWidth: 1400, margin: "0 auto", position: "relative" }}>
                <Hero />
                <Expertise />
                <NativeAdSlot />
              </main>
              <footer style={{ padding: "40px 6%", borderTop: `1px solid \${T.border}`, textAlign: "center", color: T.muted }} className="mono">
                © 2026 FAIZAN · DATA MATRIX CORES ONLINE
              </footer>
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
